name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
      - uses: astral-sh/setup-uv@v5
        if: steps.changes.outputs.backend == 'true'
      - name: Install deps
        if: steps.changes.outputs.backend == 'true'
        working-directory: backend
        run: uv sync
      - name: Ruff
        if: steps.changes.outputs.backend == 'true'
        working-directory: backend
        run: uv run ruff check .
      - name: Pytest
        if: steps.changes.outputs.backend == 'true'
        working-directory: backend
        run: uv run pytest

  deploy:
    needs: backend
    if: needs.backend.outputs.changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/tristenmaxim/teplee-backend:latest
            ghcr.io/tristenmaxim/teplee-backend:${{ github.sha }}
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/teplee
            docker-compose pull backend
            docker rm -f teplee-backend 2>/dev/null || true
            docker-compose up -d
            docker image prune -f

  webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            webapp:
              - 'webapp/**'
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.webapp == 'true'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install deps
        if: steps.changes.outputs.webapp == 'true'
        working-directory: webapp
        run: npm ci
      - name: Build
        if: steps.changes.outputs.webapp == 'true'
        working-directory: webapp
        run: npm run build
